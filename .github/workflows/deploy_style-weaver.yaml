name: Deploy style-weaver 

on: [ push ]

env:
  dirname: /var/www/html/style-weaver/
  IP_ADDRESS: '3.89.237.142'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: |
          npm install
          npm run build
          tar -czf output.tar.gz -C ./dist/ .
        env:
          # Publishable client-side values (shipped in the JS bundle);
          # .env is untracked so CI must provide them at build time.
          VITE_SUPABASE_PROJECT_ID: yibcvetoxzsrquberqwn
          VITE_SUPABASE_URL: https://yibcvetoxzsrquberqwn.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYmN2ZXRveHpzcnF1YmVycXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTg0NDEsImV4cCI6MjA4OTUzNDQ0MX0.M8Ww7XnyqvCcSZlRRGqLV-oCumBJqYdWnWXDmdbCTxU

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output.tar.gz
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: output

      - name: Remove existing files if necessary
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP_ADDRESS }}
          port: '22'
          username: 'root'
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo rm -rf ${{ env.dirname }}
            sudo mkdir -p ${{ env.dirname }}

      - name: Copy output using SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.IP_ADDRESS }}
          port: '22'
          username: 'root'
          key: ${{ secrets.SSH_KEY }}
          source: output.tar.gz
          target: ${{ env.dirname }}

      - name: Unzip files and restart server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.IP_ADDRESS }}
          port: '22'
          username: 'root'
          key: ${{ secrets.SSH_KEY }}
          script: |
            tar -xzf ${{ env.dirname }}/output.tar.gz -C ${{ env.dirname }}
            rm -rf ${{ env.dirname }}/output.tar.gz
            chown -R ec2-user ${{ env.dirname }}
            sudo nginx -s reload

