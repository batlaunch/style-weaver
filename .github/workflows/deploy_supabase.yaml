name: Deploy Supabase functions

on:
  push:
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'

env:
  SUPABASE_PROJECT_REF: yibcvetoxzsrquberqwn

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # To also apply pending SQL migrations automatically, add a
      # SUPABASE_DB_PASSWORD secret (the database password from the
      # Supabase dashboard) and uncomment:
      #
      # - name: Push database migrations
      #   run: supabase db push --db-url "postgresql://postgres.$SUPABASE_PROJECT_REF:$SUPABASE_DB_PASSWORD@aws-0-us-east-1.pooler.supabase.com:5432/postgres"
      #   env:
      #     SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
